<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <title>Поймай!</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      overflow: hidden;
      font-family: 'Arial Rounded MT Bold', Arial, sans-serif;
    }

    /* Видео с камеры — на весь экран */
    #camera {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      object-fit: cover;
    }

    /* Canvas поверх видео */
    #canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
    }

    /* UI */
    #ui {
      position: fixed;
      top: 0; left: 0; right: 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 20px;
      background: linear-gradient(to bottom, rgba(0,0,0,0.55), transparent);
      pointer-events: none;
      z-index: 10;
    }
    #score { font-size: 28px; font-weight: bold; color: #fff; text-shadow: 0 2px 6px #000; }
    #timer { font-size: 28px; font-weight: bold; color: #fff; text-shadow: 0 2px 6px #000; }

    /* Экран старта */
    #start-screen {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 20;
      gap: 16px;
      color: #fff;
      text-align: center;
      padding: 30px;
    }
    #start-screen h1 { font-size: 42px; letter-spacing: 2px; }
    #start-screen p  { font-size: 18px; opacity: 0.8; max-width: 300px; }
    #start-btn {
      margin-top: 10px;
      padding: 16px 48px;
      font-size: 22px;
      font-weight: bold;
      background: #f9c74f;
      color: #000;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(249,199,79,0.5);
    }

    /* Экран конца */
    #end-screen {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 20;
      gap: 16px;
      color: #fff;
      text-align: center;
      padding: 30px;
    }
    #end-screen h1 { font-size: 40px; }
    #end-score     { font-size: 56px; font-weight: bold; color: #f9c74f; }
    #restart-btn {
      margin-top: 10px;
      padding: 14px 44px;
      font-size: 20px;
      font-weight: bold;
      background: #f9c74f;
      color: #000;
      border: none;
      border-radius: 50px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <video id="camera" autoplay playsinline muted></video>
  <canvas id="canvas"></canvas>

  <div id="ui">
    <div id="score">⭐ 0</div>
    <div id="timer">30</div>
  </div>

  <div id="start-screen">
    <h1>🎯 Поймай!</h1>
    <p>Тапай по звёздочкам пока не закончится время</p>
    <button id="start-btn">Начать</button>
  </div>

  <div id="end-screen">
    <h1>Время вышло!</h1>
    <div>Твой счёт:</div>
    <div id="end-score">0</div>
    <button id="restart-btn">Играть снова</button>
  </div>

  <script>
    const canvas    = document.getElementById('canvas');
    const ctx       = canvas.getContext('2d');
    const video     = document.getElementById('camera');
    const scoreEl   = document.getElementById('score');
    const timerEl   = document.getElementById('timer');
    const endScreen = document.getElementById('end-screen');
    const endScore  = document.getElementById('end-score');

    // Размер canvas = размер экрана
    function resize() {
      canvas.width  = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    // Камера
    async function startCamera() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: { ideal: 'environment' } },
          audio: false
        });
        video.srcObject = stream;
      } catch (e) {
        console.warn('Камера недоступна:', e.message);
      }
    }

    // Объекты
    const EMOJIS = ['⭐','🌟','💫','✨','🔥','💎'];
    let objects       = [];
    let score         = 0;
    let timeLeft      = 30;
    let running       = false;
    let timerInterval = null;
    let animFrame     = null;
    let spawnInterval = null;

    function randomObj() {
      const margin = 70;
      return {
        x:      margin + Math.random() * (canvas.width  - margin * 2),
        y:      margin + Math.random() * (canvas.height - margin * 2 - 80),
        size:   48 + Math.random() * 20,
        emoji:  EMOJIS[Math.floor(Math.random() * EMOJIS.length)],
        born:   Date.now(),
        life:   2000 + Math.random() * 1500,
        popped: false,
        popT:   0,
      };
    }

    function spawnObj() {
      if (objects.length < 6) objects.push(randomObj());
    }

    // Рисовка
    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      const now = Date.now();
      objects = objects.filter(o => {
        const age = now - o.born;

        if (o.popped) {
          o.popT += 0.1;
          ctx.globalAlpha = Math.max(0, 1 - o.popT);
          ctx.font = `${o.size * (1 + o.popT * 0.6)}px serif`;
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillText(o.emoji, o.x, o.y);
          ctx.globalAlpha = 1;
          return o.popT < 1;
        }

        if (age > o.life) return false;

        // Мигание перед исчезновением
        const dying = age > o.life * 0.7;
        ctx.globalAlpha = (dying && Math.floor(age / 150) % 2 === 0) ? 0.25 : 1;

        // Покачивание
        const wobble = Math.sin(age * 0.004) * 6;
        ctx.font = `${o.size}px serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(o.emoji, o.x + wobble, o.y);
        ctx.globalAlpha = 1;
        return true;
      });

      if (running) animFrame = requestAnimationFrame(draw);
    }

    // Тап
    function onTap(clientX, clientY) {
      if (!running) return;
      const rect = canvas.getBoundingClientRect();
      const x = clientX - rect.left;
      const y = clientY - rect.top;

      for (const o of objects) {
        if (o.popped) continue;
        if (Math.hypot(x - o.x, y - o.y) < o.size * 0.75) {
          o.popped = true;
          score++;
          scoreEl.textContent = `⭐ ${score}`;
          break;
        }
      }
    }

    canvas.addEventListener('click', e => onTap(e.clientX, e.clientY));
    canvas.addEventListener('touchstart', e => {
      e.preventDefault();
      const t = e.changedTouches[0];
      onTap(t.clientX, t.clientY);
    }, { passive: false });

    // Старт
    function startGame() {
      score    = 0;
      timeLeft = 30;
      objects  = [];
      running  = true;
      scoreEl.textContent = '⭐ 0';
      timerEl.textContent = '30';

      spawnObj();
      spawnInterval = setInterval(spawnObj, 900);
      timerInterval = setInterval(() => {
        timeLeft--;
        timerEl.textContent = timeLeft;
        if (timeLeft <= 0) endGame();
      }, 1000);

      animFrame = requestAnimationFrame(draw);
    }

    function endGame() {
      running = false;
      clearInterval(timerInterval);
      clearInterval(spawnInterval);
      cancelAnimationFrame(animFrame);
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      endScore.textContent = score;
      endScreen.style.display = 'flex';
    }

    document.getElementById('start-btn').addEventListener('click', () => {
      document.getElementById('start-screen').style.display = 'none';
      startGame();
    });
    document.getElementById('restart-btn').addEventListener('click', () => {
      endScreen.style.display = 'none';
      startGame();
    });

    startCamera();
  </script>
</body>
</html>
