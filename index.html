<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Zombie Survival</title>
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <style>
    #hud { display:none; position:fixed; top:0; left:0; right:0; pointer-events:none; z-index:10; font-family:'Courier New',monospace; }
    #hud-bar { display:flex; justify-content:space-between; align-items:center; padding:14px 20px; background:linear-gradient(to bottom,rgba(0,0,0,.7),transparent); }
    .hud-item { color:#fff; font-size:22px; font-weight:bold; text-shadow:0 0 8px #f60; }
    #gps-box { position:fixed; bottom:12px; left:14px; color:#00ff88; font-size:13px; font-family:'Courier New',monospace; background:rgba(0,0,0,.55); padding:6px 10px; border-radius:6px; pointer-events:none; z-index:10; text-shadow:0 0 6px #00ff88; }
    #wave-banner { display:none; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); color:#f30; font-size:40px; font-weight:bold; font-family:'Courier New',monospace; text-shadow:0 0 20px red; pointer-events:none; z-index:20; animation:pop .3s ease-out; }
    @keyframes pop { from{transform:translate(-50%,-50%) scale(.4)} to{transform:translate(-50%,-50%) scale(1)} }
    #dmg-flash { display:none; position:fixed; inset:0; background:rgba(255,0,0,.35); pointer-events:none; z-index:15; }
  </style>
  <script>
    const G = window.G = {
      state:'menu', hp:5, kills:0, wave:1, waveKills:0, waveTarget:6, spawnInterval:1800,
      hud() {
        document.getElementById('hud-kills').textContent = '💀 ' + G.kills;
        document.getElementById('hud-wave').textContent  = 'WAVE ' + G.wave;
        document.getElementById('hp-hearts').textContent = '❤️'.repeat(Math.max(0, G.hp));
      }
    };

    window.startGame = function() {
      Object.assign(G, {state:'playing', hp:5, kills:0, wave:1, waveKills:0, waveTarget:6, spawnInterval:1800});
      document.querySelectorAll('.zombie-root').forEach(e => e.remove());
      document.querySelector('#startMenu').setAttribute('position','0 -500 0');
      document.querySelector('#gameOverMenu').setAttribute('position','0 -500 0');
      document.getElementById('hud').style.display = 'block';
      G.hud();
      const sp = document.querySelector('a-scene').components.spawner;
      if (sp) { sp.timer = 0; sp.interval = G.spawnInterval; }
    };

    window.damageTower = function() {
      if (G.state !== 'playing') return;
      if (--G.hp <= 0) return endGame();
      const f = document.getElementById('dmg-flash');
      f.style.display = 'block'; setTimeout(() => f.style.display='none', 180);
      G.hud();
    };

    window.nextWave = function() {
      G.wave++; G.waveKills = 0;
      G.waveTarget = 6 + G.wave * 2;
      G.spawnInterval = Math.max(500, 1800 - G.wave * 120);
      const sp = document.querySelector('a-scene').components.spawner;
      if (sp) sp.interval = G.spawnInterval;
      const b = document.getElementById('wave-banner');
      b.textContent = '⚠ WAVE ' + G.wave; b.style.display = 'block';
      setTimeout(() => b.style.display='none', 1800);
      G.hud();
    };

    window.endGame = function() {
      G.state = 'gameover';
      document.querySelectorAll('.zombie-root').forEach(e => e.remove());
      document.getElementById('hud').style.display = 'none';
      document.querySelector('#txt-final').setAttribute('value','Kills: '+G.kills+'\nWave: '+G.wave);
      document.querySelector('#gameOverMenu').setAttribute('position','0 1.5 -4');
    };

    // GPS
    window.addEventListener('load', () => {
      const box = document.getElementById('gps-box');
      if (!navigator.geolocation) return box.textContent = '📍 GPS: недоступен';
      navigator.geolocation.watchPosition(
        p => box.innerHTML = `📍 ${p.coords.latitude.toFixed(5)}, ${p.coords.longitude.toFixed(5)}<br>±${Math.round(p.coords.accuracy)} м`,
        () => box.textContent = '📍 GPS: нет доступа',
        { enableHighAccuracy:true, maximumAge:3000 }
      );
    });

    // ── A-FRAME КОМПОНЕНТЫ ──────────────────────────────

    AFRAME.registerComponent('spawner', {
      init() { this.timer = 0; this.interval = 1800; },
      tick(t, dt) {
        if (G.state !== 'playing') return;
        if ((this.timer += dt) < this.interval) return;
        this.timer = 0;
        const angle = Math.PI/3 + Math.random() * 4*Math.PI/3, r = 16;
        const x = Math.sin(angle)*r, z = Math.cos(angle)*r;
        const root = document.createElement('a-entity');
        root.className = 'zombie-root';
        root.setAttribute('position', `${x} 0 ${z}`);
        root.setAttribute('data-hp', 1 + Math.floor(G.wave/2));
        root.setAttribute('zombie-move', '');

        const hitbox = document.createElement('a-box');
        hitbox.className = 'enemy';
        hitbox.setAttribute('position','0 1 0');
        hitbox.setAttribute('width','0.8'); hitbox.setAttribute('height','2'); hitbox.setAttribute('depth','0.8');
        hitbox.setAttribute('material','opacity:0;transparent:true;depthWrite:false');
        root.appendChild(hitbox);

        const wrap = document.createElement('a-entity');
        wrap.setAttribute('rotation','0 180 0');
        const mdl = document.createElement('a-entity');
        mdl.setAttribute('gltf-model','#zombie-model');
        wrap.appendChild(mdl); root.appendChild(wrap);
        this.el.sceneEl.appendChild(root);
      }
    });

    AFRAME.registerComponent('zombie-move', {
      init() { this.speed = 0.025 + G.wave*0.004; this.dead = false; },
      tick() {
        if (G.state !== 'playing' || this.dead) return;
        const p = this.el.object3D.position;
        const dx = -p.x, dz = -p.z, d = Math.sqrt(dx*dx+dz*dz);
        if (d < 0.01) return;
        const s = this.speed + G.wave*0.003;
        p.x += dx/d*s; p.z += dz/d*s;
        this.el.object3D.rotation.y = Math.atan2(dx, dz);
        if (d < 1.4) {
          this.dead = true;
          damageTower();
          this.el.parentNode?.removeChild(this.el);
        }
      }
    });

    AFRAME.registerComponent('shooter', {
      init() {
        this.last = 0;
        const fire = this.fire.bind(this);
        window.addEventListener('mousedown', fire);
        window.addEventListener('touchstart', fire);
      },
      fire() {
        const now = Date.now();
        if (now - this.last < 120) return;
        this.last = now;

        document.querySelector('#gun-attach')?.emit('fire');
        document.querySelector('#muzzle2')?.emit('flash');

        const hits = document.querySelector('#cursor').components.raycaster.intersectedEls;
        if (!hits.length) return;
        const hit = hits[0];

        if (hit.id === 'btn-start'   && G.state === 'menu')     return startGame();
        if (hit.id === 'btn-restart' && G.state === 'gameover') return startGame();
        if (G.state !== 'playing' || !hit.classList.contains('enemy')) return;

        const root = hit.parentNode;
        if (!root) return;
        const hp = parseInt(root.getAttribute('data-hp')||'0');
        if (hp <= 0) return;
        root.setAttribute('data-hp', hp-1);

        const mdl = root.querySelector('[gltf-model]');
        if (mdl) { mdl.setAttribute('scale','1.15 1.15 1.15'); setTimeout(()=>mdl.parentNode&&mdl.setAttribute('scale','1 1 1'),120); }

        if (hp-1 <= 0) {
          root.setAttribute('data-hp','-1');
          root.parentNode?.removeChild(root);
          G.kills++; G.waveKills++;
          G.hud();
          if (G.waveKills >= G.waveTarget) nextWave();
        }
      }
    });
  </script>
</head>
<body>
  <div id="hud">
    <div id="hud-bar">
      <span class="hud-item" id="hud-kills">💀 0</span>
      <span class="hud-item" id="hud-wave">WAVE 1</span>
      <span class="hud-item" id="hp-hearts">❤️❤️❤️❤️❤️</span>
    </div>
  </div>
  <div id="gps-box">📍 Получение GPS...</div>
  <div id="wave-banner"></div>
  <div id="dmg-flash"></div>

  <a-scene spawner shooter>
    <a-assets>
      <a-asset-item id="zombie-model" src="assets/zombie.glb"></a-asset-item>
      <a-asset-item id="gun-model"    src="assets/gun.glb"></a-asset-item>
    </a-assets>

    <a-sky color="#3a1a00"></a-sky>
    <a-plane rotation="-90 0 0" width="80" height="80" color="#2e1e0a" position="0 0 0"></a-plane>

    <!-- Башня -->
    <a-entity position="0 0 0">
      <a-cylinder position="0 1.2 0" radius="0.7" height="2.4" color="#4a3820" segments-radial="8"></a-cylinder>
      <a-box      position="0 2.8 0" width="1.6" height="0.5" depth="1.6" color="#3a2810"></a-box>
      <a-cylinder position="0 3.2 0" radius="0.75" height="0.2" color="#5a4830" segments-radial="8"></a-cylinder>
      <a-sphere position="0 3.7 0" radius="0.22" color="#ff6600" material="emissive:#ff3300;emissiveIntensity:1.2"
        animation="property:scale;from:1 1 1;to:1.3 1.6 1.3;dir:alternate;dur:280;loop:true"></a-sphere>
      <a-sphere position="0 4.0 0" radius="0.12" color="#ffcc00" material="emissive:#ffaa00;emissiveIntensity:1.5"
        animation="property:scale;from:1 1 1;to:1.4 1.8 1.4;dir:alternate;dur:200;loop:true"></a-sphere>
    </a-entity>

    <!-- Развалины (генерируются скриптом ниже) -->
    <a-entity id="ruins"></a-entity>

    <!-- Камера + прицел -->
    <a-entity camera look-controls position="0 1.6 0">
      <a-entity id="cursor" cursor="rayOrigin:entity;fuse:false" raycaster="objects:.enemy,.clickable"
        position="0 0 -1" geometry="primitive:ring;radiusInner:0.016;radiusOuter:0.026"
        material="color:#ff3300;shader:flat"></a-entity>
      <a-box position=" 0.038 0 -1" width="0.01" height="0.002" depth="0.001" material="color:#ff3300;shader:flat"></a-box>
      <a-box position="-0.038 0 -1" width="0.01" height="0.002" depth="0.001" material="color:#ff3300;shader:flat"></a-box>
      <a-box position="0  0.038 -1" width="0.002" height="0.01" depth="0.001" material="color:#ff3300;shader:flat"></a-box>
      <a-box position="0 -0.038 -1" width="0.002" height="0.01" depth="0.001" material="color:#ff3300;shader:flat"></a-box>
      <a-entity id="gun-attach" position="0.28 -0.22 -0.55" rotation="0 180 0"
        animation__recoil="property:position;from:0.28 -0.22 -0.55;to:0.28 -0.20 -0.50;dur:60;dir:alternate;repeat:1;startEvents:fire">
        <a-entity gltf-model="#gun-model" scale="1 1 1"></a-entity>
        <a-sphere id="muzzle2" position="0 0 0.18" radius="0.04" color="#ffff00"
          material="emissive:#ffcc00;emissiveIntensity:3;opacity:0"
          animation__flash="property:material.opacity;from:1;to:0;dur:70;startEvents:flash"></a-sphere>
      </a-entity>
    </a-entity>

    <a-entity light="type:ambient;color:#cc7733;intensity:1.2"></a-entity>
    <a-entity light="type:point;color:#ffaa44;intensity:2.5;distance:20" position="0 4 0"></a-entity>
    <a-entity light="type:directional;color:#ffcc88;intensity:0.8" position="-4 8 5"></a-entity>

    <!-- Меню старта -->
    <a-entity id="startMenu" position="0 1.5 -4">
      <a-text value="ZOMBIE SURVIVAL" position="0 1.6 0" align="center" color="#ff3300" width="11" material="shader:flat"></a-text>
      <a-plane id="btn-start" class="clickable" color="#881100" width="3.5" height="1.3" position="0 -0.1 0"
        animation="property:scale;to:1.06 1.06 1.06;dir:alternate;dur:900;loop:true">
        <a-text value="START" color="#fff" align="center" width="10" position="0 0 0.05"></a-text>
      </a-plane>
    </a-entity>

    <!-- Меню Game Over -->
    <a-entity id="gameOverMenu" position="0 -500 0">
      <a-text value="☠ TOWER FELL ☠" position="0 1.6 0" align="center" color="#ff2200" width="11" material="shader:flat"></a-text>
      <a-text id="txt-final" value="Kills: 0&#10;Wave: 1" position="0 0.7 0" align="center" color="#ffcc44" width="9" material="shader:flat"></a-text>
      <a-plane id="btn-restart" class="clickable" color="#881100" width="3.5" height="1.3" position="0 -0.4 0"
        animation="property:scale;to:1.06 1.06 1.06;dir:alternate;dur:900;loop:true">
        <a-text value="PLAY AGAIN" color="#fff" align="center" width="10" position="0 0 0.05"></a-text>
      </a-plane>
    </a-entity>
  </a-scene>

  <script>
    // Развалины и бочки генерируются программно
    const ruins = document.getElementById('ruins');

    [
      {p:'-11 2.5 -7', w:4, h:5, d:3.5, c:'#222218'},
      {p:'-10 6.5 -7', w:2, h:2, d:2,   c:'#1a1a15'},
      {p:'12 2 -5',    w:3, h:4, d:3,   c:'#201e14'},
      {p:'-7 1.5 11',  w:5, h:3, d:4,   c:'#1e1c12'},
      {p:'9 3 10',     w:3.5,h:6,d:3,   c:'#222018'},
      {p:'9 6.5 10',   w:2, h:2, d:2,   c:'#1a1810'},
    ].forEach(({p,w,h,d,c}) => {
      const b = document.createElement('a-box');
      b.setAttribute('position',p); b.setAttribute('width',w); b.setAttribute('height',h);
      b.setAttribute('depth',d); b.setAttribute('color',c);
      ruins.appendChild(b);
    });

    [
      {p:'3.5 0.33 5',   bc:'#444',   sc:'#ff5500', ec:'#ff2200', dur:220},
      {p:'-3.5 0.33 4.5',bc:'#3a3a3a',sc:'#ff6600', ec:'#ff4400', dur:290},
      {p:'1 0.33 -5',    bc:'#333',   sc:'#ffaa00', ec:'#ff8800', dur:350},
    ].forEach(({p,bc,sc,ec,dur}) => {
      const ent = document.createElement('a-entity');
      ent.setAttribute('position', p);
      ent.innerHTML = `
        <a-cylinder radius="0.28" height="0.65" color="${bc}"></a-cylinder>
        <a-sphere radius="0.16" color="${sc}" position="0 0.4 0"
          material="emissive:${ec};emissiveIntensity:1.1"
          animation="property:scale;from:1 1 1;to:1.4 1.7 1.4;dir:alternate;dur:${dur};loop:true"></a-sphere>`;
      ruins.appendChild(ent);
    });
  </script>
</body>
</html>
