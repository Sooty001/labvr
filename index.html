<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Zombie Survival</title>
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-physics-system@v4.2.2/dist/aframe-physics-system.min.js"></script>

  <style>
    /* Простой оверлей HUD поверх сцены */
    #hud {
      display: none;
      position: fixed; top: 0; left: 0; right: 0;
      pointer-events: none; z-index: 10;
      font-family: 'Courier New', monospace;
    }
    #hud-bar {
      display: flex; justify-content: space-between; align-items: center;
      padding: 14px 20px;
      background: linear-gradient(to bottom, rgba(0,0,0,0.7), transparent);
    }
    .hud-item { color: #fff; font-size: 22px; font-weight: bold; text-shadow: 0 0 8px #f60; }
    #hp-hearts { font-size: 20px; letter-spacing: 2px; }

    /* Анонс волны */
    #wave-banner {
      display: none; position: fixed;
      top: 50%; left: 50%; transform: translate(-50%, -50%);
      color: #ff3300; font-size: 40px; font-weight: bold;
      font-family: 'Courier New', monospace;
      text-shadow: 0 0 20px #ff0000;
      pointer-events: none; z-index: 20;
      animation: pop 0.3s ease-out;
    }
    @keyframes pop { from { transform: translate(-50%,-50%) scale(0.4); } to { transform: translate(-50%,-50%) scale(1); } }

    /* Флэш урона */
    #dmg-flash {
      display: none; position: fixed; inset: 0;
      background: rgba(255,0,0,0.35);
      pointer-events: none; z-index: 15;
    }
  </style>

  <script>
    // ── СОСТОЯНИЕ ─────────────────────────────────────────
    window.G = {
      state:    'menu',   // menu | playing | gameover
      hp:       5,
      kills:    0,
      wave:     1,
      waveKills:    0,
      waveTarget:   6,     // убить столько → след. волна
      spawnInterval: 1800,
    };

    // ── СТАРТ ─────────────────────────────────────────────
    window.startGame = function () {
      let G = window.G;
      G.state = 'playing'; G.hp = 5; G.kills = 0;
      G.wave = 1; G.waveKills = 0; G.waveTarget = 6; G.spawnInterval = 1800;

      document.querySelectorAll('.zombie-root').forEach(e => e.remove());
      document.querySelector('#startMenu').setAttribute('position', '0 -500 0');
      document.querySelector('#gameOverMenu').setAttribute('position', '0 -500 0');
      document.getElementById('hud').style.display = 'block';
      updateHUD();

      let sc = document.querySelector('a-scene');
      if (sc.components.spawner) {
        sc.components.spawner.timer = 0;
        sc.components.spawner.interval = G.spawnInterval;
      }
    };

    // ── УРОН БАШНЕ ────────────────────────────────────────
    window.damageTower = function () {
      if (window.G.state !== 'playing') return;
      window.G.hp--;
      showFlash();
      updateHUD();
      if (window.G.hp <= 0) endGame();
    };

    // ── СЛЕДУЮЩАЯ ВОЛНА ───────────────────────────────────
    window.nextWave = function () {
      let G = window.G;
      G.wave++;
      G.waveKills = 0;
      G.waveTarget = 6 + G.wave * 2;
      G.spawnInterval = Math.max(500, 1800 - G.wave * 120);
      let sc = document.querySelector('a-scene');
      if (sc.components.spawner) sc.components.spawner.interval = G.spawnInterval;
      showWaveBanner('⚠ WAVE ' + G.wave);
      updateHUD();
    };

    // ── КОНЕЦ ─────────────────────────────────────────────
    window.endGame = function () {
      let G = window.G;
      G.state = 'gameover';
      document.querySelectorAll('.zombie-root').forEach(e => e.remove());
      document.getElementById('hud').style.display = 'none';
      document.querySelector('#txt-final').setAttribute('value',
        'Kills: ' + G.kills + '\nWave: ' + G.wave);
      document.querySelector('#gameOverMenu').setAttribute('position', '0 1.5 -4');
    };

    // ── HUD ───────────────────────────────────────────────
    function updateHUD() {
      let G = window.G;
      document.getElementById('hud-kills').textContent = '💀 ' + G.kills;
      document.getElementById('hud-wave').textContent  = 'WAVE ' + G.wave;
      document.getElementById('hp-hearts').textContent = '❤️'.repeat(Math.max(0, G.hp));
    }
    function showFlash() {
      let f = document.getElementById('dmg-flash');
      f.style.display = 'block';
      setTimeout(() => f.style.display = 'none', 180);
    }
    function showWaveBanner(txt) {
      let b = document.getElementById('wave-banner');
      b.textContent = txt;
      b.style.display = 'block';
      setTimeout(() => b.style.display = 'none', 1800);
    }

    // ════════════════════════════════════════════════════
    // A-FRAME КОМПОНЕНТЫ
    // ════════════════════════════════════════════════════

    // 1. СПАВНЕР
    AFRAME.registerComponent('spawner', {
      init: function () { this.timer = 0; this.interval = 1800; },
      tick: function (t, dt) {
        if (window.G.state !== 'playing') return;
        this.timer += dt;
        if (this.timer < this.interval) return;
        this.timer = 0;
        this.spawn();
      },
      spawn: function () {
        let G = window.G;
        // Спереди и с боков: ±120° от направления взгляда (-Z)
        let angle = (Math.PI / 3) + Math.random() * (4 * Math.PI / 3);
        let r      = 16;
        let x = Math.sin(angle) * r, z = Math.cos(angle) * r;

        let z_el = document.createElement('a-entity');
        z_el.setAttribute('class', 'zombie-root');
        z_el.setAttribute('position', `${x} 0 ${z}`);

        // Невидимый хитбокс — raycaster попадает именно в него
        let hitbox = document.createElement('a-box');
        hitbox.setAttribute('class', 'enemy');
        hitbox.setAttribute('position', '0 1.0 0');
        hitbox.setAttribute('width', '0.8');
        hitbox.setAttribute('height', '2.0');
        hitbox.setAttribute('depth', '0.8');
        hitbox.setAttribute('material', 'opacity: 0; transparent: true; depthWrite: false');
        z_el.appendChild(hitbox);

        // ── МОДЕЛЬ ЗОМБИ из Блендера ──
        let model = document.createElement('a-entity');
        model.setAttribute('gltf-model', '#zombie-model');
        model.setAttribute('scale',    '1 1 1');
        model.setAttribute('position', '0 0 0');
        model.setAttribute('rotation', '0 180 0'); // разворот — в Blender зомби смотрит в -Y, в A-Frame нужно +Z
        // Покачивание при ходьбе
        model.setAttribute('animation__walk',
          'property: rotation; from: 0 0 -2; to: 0 0 2; dir: alternate; dur: 350; loop: true; easing: easeInOutSine');
        z_el.appendChild(model);

        // HP: 1 + бонус за волну
        let hp = 1 + Math.floor(G.wave / 2);
        z_el.setAttribute('data-hp', hp);
        z_el.setAttribute('data-maxhp', hp);

        // Компонент движения
        z_el.setAttribute('zombie-move', '');

        this.el.sceneEl.appendChild(z_el);
      }
    });

    // 2. ДВИЖЕНИЕ ЗОМБИ
    AFRAME.registerComponent('zombie-move', {
      init: function () {
        this.speed = 0.025 + window.G.wave * 0.004;
      },
      tick: function () {
        if (window.G.state !== 'playing') return;
        let p = this.el.object3D.position;
        let dx = -p.x, dz = -p.z;
        let d  = Math.sqrt(dx*dx + dz*dz);
        if (d < 0.01) return;
        let s = this.speed + window.G.wave * 0.003;
        p.x += (dx/d) * s;
        p.z += (dz/d) * s;
        this.el.object3D.rotation.y = Math.atan2(dx, dz);
        if (d < 1.4) {
          window.damageTower();
          this.el.remove();
        }
      }
    });

    // 3. СТРЕЛЬБА (тап/клик)
    AFRAME.registerComponent('shooter', {
      init: function () {
        window.addEventListener('mousedown',  this.fire.bind(this));
        window.addEventListener('touchstart', this.fire.bind(this));
      },
      fire: function () {
        let G = window.G;

        // Вспышка дула
        // Анимация отдачи и вспышка
        let gunEnt = document.querySelector('#gun-attach');
        if (gunEnt) gunEnt.emit('fire');
        let flash2 = document.querySelector('#muzzle2');
        if (flash2) flash2.emit('flash');

        let raycaster = document.querySelector('#cursor').components.raycaster;
        let hits = raycaster.intersectedEls;
        if (!hits.length) return;

        let hit = hits[0];

        // Кнопки меню
        if (hit.id === 'btn-start'   && G.state === 'menu')     { window.startGame(); return; }
        if (hit.id === 'btn-restart' && G.state === 'gameover') { window.startGame(); return; }

        // hit — это хитбокс .enemy, его родитель — zombie-root с data-hp
        if (G.state !== 'playing') return;
        if (!hit.classList.contains('enemy')) return;

        // Корень зомби — parentElement хитбокса
        let root = hit.parentElement || hit.parentNode;
        if (!root) return;

        let hp = parseInt(root.getAttribute('data-hp') || '1') - 1;
        root.setAttribute('data-hp', hp);

        // Вспышка попадания — быстрое масштабирование
        let mdl = root.querySelector('[gltf-model]');
        if (mdl) {
          mdl.setAttribute('scale', '1.15 1.15 1.15');
          setTimeout(() => { if (mdl.parentNode) mdl.setAttribute('scale', '1 1 1'); }, 120);
        }

        if (hp <= 0) {
          root.parentNode.removeChild(root);
          G.kills++; G.waveKills++;
          updateHUD();
          if (G.waveKills >= G.waveTarget) window.nextWave();
        }
      }
    });
  </script>
</head>

<body>
  <!-- HTML HUD -->
  <div id="hud">
    <div id="hud-bar">
      <span class="hud-item" id="hud-kills">💀 0</span>
      <span class="hud-item" id="hud-wave">WAVE 1</span>
      <span class="hud-item" id="hp-hearts">❤️❤️❤️❤️❤️</span>
    </div>
  </div>

  <div id="wave-banner"></div>
  <div id="dmg-flash"></div>

  <a-scene physics="debug: false" spawner shooter>

    <a-assets>
      <a-asset-item id="zombie-model" src="assets/zombie.glb"></a-asset-item>
      <a-asset-item id="gun-model"    src="assets/gun.glb"></a-asset-item>
    </a-assets>

    <!-- НЕБО -->
    <a-sky color="#3a1a00"></a-sky>

    <!-- ЗЕМЛЯ -->
    <a-plane id="ground" static-body
             rotation="-90 0 0" width="80" height="80"
             color="#2e1e0a" position="0 0 0"></a-plane>

    <!-- БАШНЯ -->
    <a-entity position="0 0 0">
      <a-cylinder position="0 1.2 0" radius="0.7" height="2.4" color="#4a3820" segments-radial="8"></a-cylinder>
      <a-box      position="0 2.8 0" width="1.6" height="0.5" depth="1.6"  color="#3a2810"></a-box>
      <a-cylinder position="0 3.2 0" radius="0.75" height="0.2" color="#5a4830" segments-radial="8"></a-cylinder>
      <!-- огонь -->
      <a-sphere position="0 3.7 0" radius="0.22" color="#ff6600"
                material="emissive:#ff3300; emissiveIntensity:1.2"
                animation="property:scale; from:1 1 1; to:1.3 1.6 1.3; dir:alternate; dur:280; loop:true"></a-sphere>
      <a-sphere position="0 4.0 0" radius="0.12" color="#ffcc00"
                material="emissive:#ffaa00; emissiveIntensity:1.5"
                animation="property:scale; from:1 1 1; to:1.4 1.8 1.4; dir:alternate; dur:200; loop:true"></a-sphere>
    </a-entity>

    <!-- РАЗВАЛИНЫ -->
    <a-box position="-11 2.5 -7"  width="4" height="5" depth="3.5" color="#222218"></a-box>
    <a-box position="-10 5.5 -7"  width="2" height="3" depth="2"   color="#1a1a15"></a-box>
    <a-box position="12  2   -5"  width="3" height="4" depth="3"   color="#201e14"></a-box>
    <a-box position="-7  1.5  11" width="5" height="3" depth="4"   color="#1e1c12"></a-box>
    <a-box position="9   3    10" width="3.5" height="6" depth="3" color="#222018"></a-box>
    <a-box position="9   6.5  10" width="2"   height="2" depth="2" color="#1a1810"></a-box>

    <!-- БОЧКИ -->
    <a-entity position="3.5 0 5">
      <a-cylinder radius="0.28" height="0.65" color="#444" position="0 0.33 0"></a-cylinder>
      <a-sphere radius="0.18" color="#ff5500" position="0 0.72 0"
                material="emissive:#ff2200; emissiveIntensity:1.2"
                animation="property:scale; from:1 1 1; to:1.4 1.7 1.4; dir:alternate; dur:220; loop:true"></a-sphere>
    </a-entity>
    <a-entity position="-4.5 0 3.5">
      <a-cylinder radius="0.28" height="0.65" color="#3a3a3a" position="0 0.33 0"></a-cylinder>
      <a-sphere radius="0.18" color="#ff6600" position="0 0.72 0"
                material="emissive:#ff4400; emissiveIntensity:1"
                animation="property:scale; from:1 1 1; to:1.3 1.6 1.3; dir:alternate; dur:290; loop:true"></a-sphere>
    </a-entity>
    <a-entity position="1 0 -5">
      <a-cylinder radius="0.28" height="0.65" color="#333" position="0 0.33 0"></a-cylinder>
      <a-sphere radius="0.15" color="#ffaa00" position="0 0.7 0"
                material="emissive:#ff8800; emissiveIntensity:0.9"
                animation="property:scale; from:1 1 1; to:1.2 1.5 1.2; dir:alternate; dur:350; loop:true"></a-sphere>
    </a-entity>

    <!-- КАМЕРА + ПРИЦЕЛ -->
    <a-entity id="camera" camera look-controls position="0 1.6 0">
      <a-entity id="cursor"
                cursor="rayOrigin: entity; fuse: false"
                raycaster="objects: .enemy, .clickable"
                position="0 0 -1"
                geometry="primitive: ring; radiusInner: 0.016; radiusOuter: 0.026"
                material="color: #ff3300; shader: flat">
      </a-entity>

      <!-- Перекрестие -->
      <a-box position=" 0.038 0 -1" width="0.01" height="0.002" depth="0.001" material="color:#ff3300;shader:flat"></a-box>
      <a-box position="-0.038 0 -1" width="0.01" height="0.002" depth="0.001" material="color:#ff3300;shader:flat"></a-box>
      <a-box position="0  0.038 -1" width="0.002" height="0.01" depth="0.001" material="color:#ff3300;shader:flat"></a-box>
      <a-box position="0 -0.038 -1" width="0.002" height="0.01" depth="0.001" material="color:#ff3300;shader:flat"></a-box>

      <!-- Пистолет — модель из Блендера -->
      <a-entity id="gun-attach"
                position="0.28 -0.22 -0.55"
                rotation="0 180 0"
                animation__recoil="property: position; from: 0.28 -0.22 -0.55; to: 0.28 -0.20 -0.50; dur: 60; dir: alternate; repeat: 1; startEvents: fire">
        <a-entity gltf-model="#gun-model" scale="1 1 1"></a-entity>
        <a-sphere id="muzzle2" position="0 0 0.18" radius="0.04" color="#ffff00"
                  material="emissive:#ffcc00; emissiveIntensity:3; opacity:0"
                  animation__flash="property: material.opacity; from:1; to:0; dur:70; startEvents:flash"></a-sphere>
      </a-entity>
    </a-entity>

    <!-- СВЕТ -->
    <a-entity light="type: ambient; color:#cc7733; intensity:1.2"></a-entity>
    <a-entity light="type: point; color:#ffaa44; intensity:2.5; distance:20" position="0 4 0"></a-entity>
    <a-entity light="type: directional; color:#ffcc88; intensity:0.8" position="-4 8 5"></a-entity>

    <!-- МЕНЮ СТАРТА -->
    <a-entity id="startMenu" position="0 1.5 -4">
      <a-text value="☣ ZOMBIE SURVIVAL ☣"
              position="0 1.6 0" align="center" color="#ff3300" width="11"
              material="shader:flat"></a-text>
      <a-text value="Defend the tower. Survive as long as you can."
              position="0 0.8 0" align="center" color="#cc9966" width="8"
              material="shader:flat"></a-text>
      <a-plane id="btn-start" class="clickable"
               color="#881100" width="3.5" height="1.3" position="0 -0.1 0"
               animation="property:scale; to:1.06 1.06 1.06; dir:alternate; dur:900; loop:true">
        <a-text value="START" color="#ffffff" align="center" width="10" position="0 0 0.05"></a-text>
      </a-plane>
    </a-entity>

    <!-- МЕНЮ GAME OVER -->
    <a-entity id="gameOverMenu" position="0 -500 0">
      <a-text value="☠ TOWER FELL ☠"
              position="0 1.6 0" align="center" color="#ff2200" width="11"
              material="shader:flat"></a-text>
      <a-text id="txt-final" value="Kills: 0&#10;Wave: 1"
              position="0 0.7 0" align="center" color="#ffcc44" width="9"
              material="shader:flat"></a-text>
      <a-plane id="btn-restart" class="clickable"
               color="#881100" width="3.5" height="1.3" position="0 -0.4 0"
               animation="property:scale; to:1.06 1.06 1.06; dir:alternate; dur:900; loop:true">
        <a-text value="PLAY AGAIN" color="#ffffff" align="center" width="10" position="0 0 0.05"></a-text>
      </a-plane>
    </a-entity>

  </a-scene>
</body>
</html>
