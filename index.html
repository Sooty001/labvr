<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AR Game: Поймай объект</title>

  <!-- A-Frame -->
  <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
  <!-- AR.js (стабильный CDN) -->
  <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js@3.4.5/aframe/build/aframe-ar.js"></script>
  <!-- Физика -->
  <script src="https://cdn.jsdelivr.net/gh/n5ro/aframe-physics-system@v4.0.1/dist/aframe-physics-system.min.js"></script>

  <style>
    body { margin: 0; overflow: hidden; font-family: sans-serif; }

    #ui-container {
      position: absolute; top: 10px; left: 10px;
      z-index: 1000; color: white;
      text-shadow: 2px 2px 4px #000;
      pointer-events: none;
    }
    #score-text { font-size: 24px; font-weight: bold; margin-bottom: 5px; }
    #gps-text {
      font-size: 14px;
      background: rgba(0,0,0,0.5);
      padding: 5px; border-radius: 5px;
    }

    #game-over {
      display: none;
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      z-index: 1000;
      font-size: 36px; color: #ffeb3b;
      text-shadow: 3px 3px 5px #000;
      background: rgba(0,0,0,0.85);
      padding: 30px; border-radius: 15px;
      text-align: center;
    }
  </style>

  <script>
    // ─── Игровая логика ───────────────────────────────────────────────────────
    // Компонент навешан на <a-scene>, управляет целевым объектом снаружи
    AFRAME.registerComponent('game-manager', {
      init: function () {
        this.score    = 0;
        this.maxScore = 5;

        this.target      = document.querySelector('#target-container');
        this.scoreUI     = document.getElementById('score-text');
        this.gameOverUI  = document.getElementById('game-over');

        // Слушаем клик/тап по цели
        this.target.addEventListener('click', () => this.onCollect());
      },

      onCollect: function () {
        this.score++;
        this.scoreUI.innerText = `Очки: ${this.score}`;

        // Анимация исчезновения уже запускается через animation__click

        if (this.score >= this.maxScore) {
          setTimeout(() => {
            this.target.setAttribute('visible', 'false');
            this.gameOverUI.style.display = 'block';
          }, 220);
        } else {
          setTimeout(() => this.respawn(), 220);
        }
      },

      respawn: function () {
        const target = this.target;

        // Отключаем физику перед перемещением
        target.removeAttribute('dynamic-body');

        // Случайная позиция перед игроком
        const x = (Math.random() - 0.5) * 4;
        const z = -(Math.random() * 2 + 2);
        const y = 3;

        target.setAttribute('position', { x, y, z });
        target.setAttribute('scale', '1 1 1');   // восстанавливаем масштаб
        target.setAttribute('visible', 'true');

        // Включаем физику после того, как сцена применила новую позицию
        target.addEventListener('loaded', enableBody, { once: true });
        function enableBody() {
          target.setAttribute('dynamic-body', 'shape: box; mass: 1');
        }
        // Запасной вариант на случай, если событие уже было
        setTimeout(() => {
          if (!target.body) {
            target.setAttribute('dynamic-body', 'shape: box; mass: 1');
          }
        }, 100);
      }
    });

    // ─── GPS ──────────────────────────────────────────────────────────────────
    window.addEventListener('load', () => {
      const gpsUI = document.getElementById('gps-text');
      if (!('geolocation' in navigator)) {
        gpsUI.innerText = 'GPS не поддерживается';
        return;
      }
      navigator.geolocation.watchPosition(
        ({ coords }) => {
          gpsUI.innerText =
            `GPS: ${coords.latitude.toFixed(5)}, ${coords.longitude.toFixed(5)}`;
        },
        (err) => { gpsUI.innerText = 'Ошибка GPS: ' + err.message; },
        { enableHighAccuracy: true, maximumAge: 0, timeout: 5000 }
      );
    });
  </script>
</head>

<body>
  <!-- UI -->
  <div id="ui-container">
    <div id="score-text">Очки: 0</div>
    <div id="gps-text">Поиск GPS…</div>
  </div>
  <div id="game-over">
    🎉 ИГРА ОКОНЧЕНА!<br>
    <span style="font-size: 20px;">Вы собрали всё!</span>
  </div>

  <!--
    arjs: sourceType=webcam — камера устройства
    Убираем a-sky (мешает видеопотоку AR)
    Убираем look-controls с камеры (конфликтует с AR-ориентацией)
  -->
  <a-scene
    embedded
    arjs="sourceType: webcam; debugUIEnabled: false;"
    physics="debug: false"
    cursor="rayOrigin: mouse"
    game-manager
  >

    <!-- Assets -->
    <a-assets>
      <img   id="ground-tex"  src="https://i.imgur.com/mCQhcAQ.jpeg" crossorigin="anonymous">
      <!-- Звук collect (короткий поп-звук, публичный) -->
      <audio id="pop-sound"   src="https://cdn.freesound.org/previews/341/341695_5858296-lq.mp3" crossorigin="anonymous" preload="auto"></audio>
      <!-- Модель (положите model.glb рядом с html-файлом) -->
      <a-asset-item id="my-model" src="model.glb"></a-asset-item>
    </a-assets>

    <!-- Свет -->
    <a-light type="ambient"     color="#ffffff" intensity="0.8"></a-light>
    <a-light type="directional" color="#ffffff" intensity="0.5" position="-1 2 1"></a-light>

    <!--
      Камера: без look-controls — AR.js сам управляет ориентацией камеры
    -->
    <a-camera position="0 1.6 0" look-controls="enabled: false">
      <a-text value="Тапни по объекту!" position="-0.6 0.5 -2" color="#ff4444" scale="0.5 0.5 0.5"></a-text>
    </a-camera>

    <!-- Земля -->
    <a-plane
      src="#ground-tex"
      rotation="-90 0 0"
      width="10" height="10"
      position="0 0 -2"
      static-body
      opacity="0.8"
    ></a-plane>

    <!-- ── Целевой объект ────────────────────────────────────────────────── -->
    <a-entity
      id="target-container"
      position="0 3 -3"
      dynamic-body="shape: box; mass: 1"
      animation__click="property: scale; startEvents: click; easing: easeInCubic; dur: 200; to: 0 0 0"
    >
      <!-- Звук -->
      <a-entity sound="src: #pop-sound; on: click"></a-entity>

      <!-- Вращение -->
      <a-entity animation="property: rotation; to: 0 360 0; loop: true; dur: 2500; easing: linear">

        <!-- 3D-модель. Если model.glb не найден — покажется золотой куб -->
        <a-entity
          gltf-model="#my-model"
          scale="0.5 0.5 0.5"
          position="0 0 0"
          gltf-model-error="fallback: #fallback-box"
        ></a-entity>

        <!-- Fallback-куб (скрыт по умолчанию, JS покажет его при ошибке) -->
        <a-box id="fallback-box" color="gold" scale="0.5 0.5 0.5" visible="false"></a-box>

      </a-entity>
    </a-entity>

  </a-scene>

  <script>
    // Показываем fallback-куб, если модель не загрузилась
    document.querySelector('[gltf-model="#my-model"]')
      .addEventListener('model-error', () => {
        document.querySelector('#fallback-box').setAttribute('visible', 'true');
      });
  </script>
</body>
</html>
