<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <title>AR Game: Поймай объект</title>
  
  <!-- ЗАМЕНИЛИ: Библиотека A-Frame (теперь грузится с надежного сервера cdnjs) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/aframe/1.3.0/aframe.min.js"></script>
  
  <!-- Библиотека AR.js -->
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  
  <!-- Физический движок -->
  <script src="https://cdn.jsdelivr.net/gh/n5ro/aframe-physics-system@v4.0.1/dist/aframe-physics-system.min.js"></script>

  <style>
    body { margin: 0; overflow: hidden; font-family: sans-serif; }
    #ui-container { position: absolute; top: 10px; left: 10px; z-index: 1000; color: white; text-shadow: 2px 2px 4px #000; pointer-events: none; }
    #score-text { font-size: 24px; font-weight: bold; margin-bottom: 5px; }
    #gps-text { font-size: 14px; background: rgba(0,0,0,0.5); padding: 5px; border-radius: 5px; }
    #game-over { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 1000; font-size: 40px; color: #ffeb3b; text-shadow: 3px 3px 5px #000; background: rgba(0,0,0,0.8); padding: 30px; border-radius: 15px; text-align: center; }
  </style>

  <script>
    AFRAME.registerComponent('game-manager', {
      init: function () {
        this.score = 0;
        this.maxScore = 5; 
        this.target = document.querySelector('#target-container');
        this.scoreUI = document.getElementById('score-text');
        this.gameOverUI = document.getElementById('game-over');
        this.clickSound = document.querySelector('#collect-sound');

        this.target.addEventListener('click', () => {
          this.score++;
          this.scoreUI.innerText = `Очки: ${this.score}`;
          this.clickSound.components.sound.playSound();

          if (this.score >= this.maxScore) {
            setTimeout(() => {
              this.target.setAttribute('visible', 'false');
              this.gameOverUI.style.display = 'block';
            }, 200); 
          } else {
            setTimeout(() => {
              this.target.removeAttribute('dynamic-body'); 
              let x = (Math.random() - 0.5) * 4; 
              let z = (Math.random() * -3) - 2; 
              let y = 3; 

              this.target.setAttribute('position', `${x} ${y} ${z}`);
              this.target.setAttribute('scale', '1 1 1'); 
              
              setTimeout(() => {
                this.target.setAttribute('dynamic-body', 'shape: box; mass: 1');
              }, 50);

            }, 200); 
          }
        });
      }
    });

    window.onload = () => {
      const gpsUI = document.getElementById('gps-text');
      if ('geolocation' in navigator) {
        navigator.geolocation.watchPosition(
          (position) => {
            const lat = position.coords.latitude.toFixed(5);
            const lng = position.coords.longitude.toFixed(5);
            gpsUI.innerText = `GPS: Широта ${lat}, Долгота ${lng}`;
          },
          (error) => { gpsUI.innerText = "Ошибка GPS: " + error.message; },
          { enableHighAccuracy: true, maximumAge: 0, timeout: 5000 }
        );
      } else {
        gpsUI.innerText = "GPS не поддерживается на вашем устройстве";
      }
    };
  </script>
</head>

<body>
  <div id="ui-container">
    <div id="score-text">Очки: 0</div>
    <div id="gps-text">Поиск GPS координат...</div>
  </div>
  <div id="game-over">ИГРА ОКОНЧЕНА!<br><span style="font-size: 20px;">Вы собрали всё!</span></div>

  <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" physics="debug: false" cursor="rayOrigin: mouse">
    
    <a-assets>
      <img id="ground-tex" src="https://i.imgur.com/mCQhcAQ.jpeg" crossorigin="anonymous">
      <!-- ЗАМЕНИЛИ ссылку на звук на независимую -->
      <audio id="pop-sound" src="https://actions.google.com/sounds/v1/cartoon/pop.ogg" crossorigin="anonymous"></audio>
      <a-asset-item id="my-model" src="model.glb"></a-asset-item>
    </a-assets>

    <a-sky color="#87CEEB" opacity="0.2"></a-sky>

    <a-light type="ambient" color="#ffffff" intensity="0.7"></a-light>
    <a-light type="directional" position="-1 2 1" intensity="0.5"></a-light>

    <a-camera position="0 1.6 0" look-controls>
      <a-text value="Catch the items!" position="-0.5 0.5 -2" color="#ff0000" scale="0.5 0.5 0.5"></a-text>
    </a-camera>

    <a-plane src="#ground-tex" rotation="-90 0 0" width="10" height="10" position="0 0 -2" static-body opacity="0.8"></a-plane>

    <a-entity id="target-container" position="0 3 -3" 
              dynamic-body="shape: box; mass: 1" 
              game-manager
              animation__click="property: scale; startEvents: click; easing: easeInCubic; dur: 200; to: 0 0 0">
      
      <a-entity id="collect-sound" sound="src: #pop-sound"></a-entity>

      <a-entity animation="property: rotation; to: 0 360 0; loop: true; dur: 2500; easing: linear">
        <a-entity gltf-model="#my-model" scale="0.5 0.5 0.5" position="0 0 0">
          <a-box color="gold" scale="0.5 0.5 0.5"></a-box>
        </a-entity>
      </a-entity>
    </a-entity>

  </a-scene>
</body>
</html>
