<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
  <title>AR Game: Поймай объект</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/aframe/1.2.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  <!-- Физику убираем: aframe-physics-system нестабильна в AR.js без маркеров.
       Падение реализуем вручную через tick(). -->

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; font-family: 'Arial Rounded MT Bold', Arial, sans-serif; }

    #ui {
      position: fixed; top: 0; left: 0; right: 0;
      display: flex; justify-content: space-between; align-items: center;
      padding: 16px 20px; background: linear-gradient(to bottom, rgba(0,0,0,0.55), transparent);
      pointer-events: none; z-index: 10;
    }
    #score { font-size: 28px; font-weight: bold; color: #fff; text-shadow: 0 2px 6px #000; }
    #timer { font-size: 28px; font-weight: bold; color: #fff; text-shadow: 0 2px 6px #000; }
    #gps-info { font-size: 14px; color: #aaa; position: absolute; bottom: -20px; left: 20px; text-shadow: 1px 1px 2px #000; }

    #start-screen {
      position: fixed; inset: 0; background: rgba(0,0,0,0.75);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      z-index: 20; gap: 16px; color: #fff; text-align: center; padding: 30px; pointer-events: auto;
    }
    #start-screen h1 { font-size: 42px; letter-spacing: 2px; }
    #start-screen p  { font-size: 18px; opacity: 0.8; max-width: 300px; }
    #start-btn, #restart-btn {
      margin-top: 10px; padding: 16px 48px; font-size: 22px; font-weight: bold;
      background: #f9c74f; color: #000; border: none; border-radius: 50px; cursor: pointer;
      box-shadow: 0 4px 20px rgba(249,199,79,0.5); pointer-events: auto;
    }

    #end-screen {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8);
      flex-direction: column; align-items: center; justify-content: center;
      z-index: 20; gap: 16px; color: #fff; text-align: center; padding: 30px; pointer-events: auto;
    }
    #end-screen h1 { font-size: 40px; }
    #end-score     { font-size: 56px; font-weight: bold; color: #f9c74f; }
  </style>

  <script>
    // ===== Компонент регистрируем ДО инициализации A-Frame =====
    let isPlaying = false;
    let score = 0;

    // Компонент ручного падения (заменяет physics)
    // Каждый объект сам управляет своей Y-координатой
    AFRAME.registerComponent('faller', {
      schema: { active: { default: false } },
      init: function () {
        this.vy = 0;          // вертикальная скорость
        this.gravity = -4.5;  // ускорение (м/с²)
        this.floor = -1.5;    // Y при достижении которой объект телепортируется наверх
      },
      tick: function (time, delta) {
        if (!this.data.active || !isPlaying) return;
        const dt = delta / 1000;
        this.vy += this.gravity * dt;
        const pos = this.el.getAttribute('position');
        pos.y += this.vy * dt;
        if (pos.y < this.floor) {
          // Упал на пол — перерождаем
          this.el.components['faller'].reset();
        } else {
          this.el.setAttribute('position', pos);
        }
      },
      reset: function () {
        this.vy = 0;
        const x = (Math.random() - 0.5) * 3;   // -1.5 .. +1.5
        const z = -(2.5 + Math.random() * 2);   // -2.5 .. -4.5 ПЕРЕД игроком
        const y = 4 + Math.random() * 2;        // 4 .. 6 сверху
        this.el.setAttribute('position', { x, y, z });
        this.el.setAttribute('scale', '1 1 1'); // восстановить после hit-анимации
      }
    });

    AFRAME.registerComponent('game-manager', {
      init: function () {
        this.el.addEventListener('loaded', () => {
          this.setupTargets();
        });
      },

      setupTargets: function () {
        this.targets = Array.from(document.querySelectorAll('.target-obj'));
        const clickSound = document.querySelector('#pop-sound');

        this.targets.forEach(target => {
          target.addEventListener('mousedown', () => {
            if (!isPlaying) return;

            if (clickSound && clickSound.components.sound) {
              clickSound.components.sound.playSound();
            }

            score++;
            document.getElementById('score').textContent = `⭐ ${score}`;

            target.emit('hit');

            // После анимации сжатия — перерождаем
            setTimeout(() => {
              const faller = target.components['faller'];
              if (faller) faller.reset();
            }, 200);
          });
        });
      },

      respawn: function (target) {
        const faller = target.components['faller'];
        if (faller) {
          faller.data.active = true;
          faller.reset();
        }
      }
    });

    // ===== UI и таймер =====
    window.addEventListener('DOMContentLoaded', () => {
      let timeLeft = 30;
      let timerInterval = null;

      const startBtn    = document.getElementById('start-btn');
      const restartBtn  = document.getElementById('restart-btn');
      const startScreen = document.getElementById('start-screen');
      const endScreen   = document.getElementById('end-screen');
      const scoreEl     = document.getElementById('score');
      const timerEl     = document.getElementById('timer');
      const endScoreEl  = document.getElementById('end-score');

      function getManager() {
        const scene = document.querySelector('a-scene');
        return scene && scene.components['game-manager'];
      }

      function startGame() {
        const manager = getManager();
        if (!manager) return;

        startScreen.style.display = 'none';
        endScreen.style.display   = 'none';

        score    = 0;
        timeLeft = 30;
        isPlaying = true;
        scoreEl.textContent = '⭐ 0';
        timerEl.textContent = '30';

        if (timerInterval) clearInterval(timerInterval);

        // Активируем все объекты и сбрасываем позиции
        const targets = document.querySelectorAll('.target-obj');
        targets.forEach(t => {
          // Включаем faller и сбрасываем на случайную позицию перед игроком
          t.setAttribute('faller', 'active: true');
          const faller = t.components['faller'];
          if (faller) { faller.vy = 0; faller.reset(); }
        });

        timerInterval = setInterval(() => {
          timeLeft--;
          timerEl.textContent = timeLeft;
          if (timeLeft <= 0) endGame();
        }, 1000);
      }

      function endGame() {
        isPlaying = false;
        clearInterval(timerInterval);
        timerInterval = null;
        endScoreEl.textContent = score;
        endScreen.style.display = 'flex';
      }

      startBtn.addEventListener('click', startGame);
      restartBtn.addEventListener('click', startGame);

      // GPS
      const gpsUI = document.getElementById('gps-info');
      if ('geolocation' in navigator) {
        navigator.geolocation.watchPosition(
          pos => {
            gpsUI.innerText = `GPS: ${pos.coords.latitude.toFixed(5)}, ${pos.coords.longitude.toFixed(5)}`;
          },
          () => { gpsUI.innerText = 'GPS недоступен'; },
          { enableHighAccuracy: true }
        );
      }
    });
  </script>
</head>

<body>
  <!-- HTML интерфейс -->
  <div id="ui">
    <div id="score">⭐ 0</div>
    <div id="timer">30</div>
    <div id="gps-info">Поиск GPS...</div>
  </div>

  <div id="start-screen">
    <h1>🎯 Поймай AR!</h1>
    <p>Тапай по 3D моделям, пока не закончится время</p>
    <button id="start-btn">Начать</button>
  </div>

  <div id="end-screen">
    <h1>Время вышло!</h1>
    <div>Твой счёт:</div>
    <div id="end-score">0</div>
    <button id="restart-btn">Играть снова</button>
  </div>

  <!-- A-Frame AR сцена -->
  <!--
    ФИКС cursor: перенесён на a-camera с raycaster,
    чтобы клики по объектам в AR работали корректно.
    На уровне a-scene оставляем только атрибуты сцены.
  -->
  <a-scene
    game-manager
    vr-mode-ui="enabled: false"
    arjs="sourceType: webcam; debugUIEnabled: false; trackingMethod: best;"
    renderer="logarithmicDepthBuffer: true; colorManagement: true;"
  >
    <a-assets>
      <img   id="ground-tex"   src="https://i.imgur.com/mCQhcAQ.jpeg" crossorigin="anonymous">
      <audio id="click-sound"  src="https://actions.google.com/sounds/v1/cartoon/pop.ogg" crossorigin="anonymous" preload="auto"></audio>
      <a-asset-item id="blender-model" src="model.glb"></a-asset-item>
    </a-assets>

    <!-- Звук -->
    <a-entity id="pop-sound" sound="src: #click-sound; poolSize: 5"></a-entity>

    <!-- Sky прозрачный (для AR-камеры) -->
    <a-sky color="#ffffff" opacity="0"></a-sky>

    <!-- Свет -->
    <a-light type="ambient"     color="#ffffff" intensity="0.8"></a-light>
    <a-light type="directional" position="-1 2 1" intensity="0.5"></a-light>

    <!--
      ФИКС камеры:
      - look-controls отключён (AR управляет камерой сам)
      - cursor + raycaster добавлены на камеру — так клики/тапы
        корректно проецируются в 3D-пространство AR
    -->
    <a-camera
      position="0 1.6 0"
      look-controls="enabled: false"
      cursor="fuse: false; rayOrigin: mouse"
      raycaster="objects: .target-obj; far: 30"
    >
      <!-- a-text убран: в AR он рендерится как текстура и "плывёт" по экрану -->
    </a-camera>

    <!-- Земля — визуальная, без физики -->
    <a-plane
      src="#ground-tex"
      rotation="-90 0 0"
      width="20" height="20"
      position="0 -1.5 -3.5"
      opacity="0.35"
    ></a-plane>

    <!-- ===== ЦЕЛЕВЫЕ ОБЪЕКТЫ =====
         faller компонент управляет падением.
         Объекты стартуют с active:false — активируются при нажатии "Начать".
         z = -3..-4.5 = ПЕРЕД игроком, не на нём.
    -->

    <!-- Объект 1 -->
    <a-entity class="target-obj"
              faller="active: false"
              position="-1 4 -3.5"
              animation__hit="property: scale; to: 0.01 0.01 0.01; dur: 120; startEvents: hit; easing: easeInQuad">
      <a-entity animation="property: rotation; to: 0 360 0; loop: true; dur: 3000; easing: linear">
        <a-entity gltf-model="#blender-model" scale="1 1 1"></a-entity>
      </a-entity>
    </a-entity>

    <!-- Объект 2 -->
    <a-entity class="target-obj"
              faller="active: false"
              position="0 5 -4"
              animation__hit="property: scale; to: 0.01 0.01 0.01; dur: 120; startEvents: hit; easing: easeInQuad">
      <a-entity animation="property: rotation; to: 0 -360 0; loop: true; dur: 2500; easing: linear">
        <a-entity gltf-model="#blender-model" scale="1 1 1"></a-entity>
      </a-entity>
    </a-entity>

    <!-- Объект 3 -->
    <a-entity class="target-obj"
              faller="active: false"
              position="1 4.5 -3.5"
              animation__hit="property: scale; to: 0.01 0.01 0.01; dur: 120; startEvents: hit; easing: easeInQuad">
      <a-entity animation="property: rotation; to: 360 360 0; loop: true; dur: 4000; easing: linear">
        <a-entity gltf-model="#blender-model" scale="1 1 1"></a-entity>
      </a-entity>
    </a-entity>

  </a-scene>
</body>
</html>
